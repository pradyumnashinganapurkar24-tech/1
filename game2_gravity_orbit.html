<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Orbit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000005; font-family: 'Courier New', monospace; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; display: flex;
    justify-content: space-between; align-items: center; padding: 16px 24px; z-index: 10;
    pointer-events: none;
  }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; letter-spacing: 3px; color: #4ade80; opacity: 0.7; }
  .stat-value { font-size: 28px; color: #4ade80; text-shadow: 0 0 20px #22c55e; }
  #overlay {
    position: fixed; inset: 0; background: #000005;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #overlay h1 {
    font-size: 72px; color: #4ade80;
    text-shadow: 0 0 40px #16a34a, 0 0 80px #15803d;
    letter-spacing: 8px; margin-bottom: 8px;
  }
  #overlay p { color: #86efac; letter-spacing: 3px; margin-bottom: 10px; font-size: 13px; }
  #overlay .sub { color: #4ade80; opacity: 0.5; font-size: 11px; letter-spacing: 2px; margin-bottom: 40px; }
  #startBtn {
    padding: 14px 48px; background: transparent; border: 2px solid #4ade80;
    color: #4ade80; font-size: 14px; letter-spacing: 4px; cursor: pointer;
    font-family: inherit; transition: all 0.3s;
    text-shadow: 0 0 10px #4ade80; box-shadow: 0 0 20px rgba(74,222,128,0.3);
  }
  #startBtn:hover { background: #4ade80; color: #000; box-shadow: 0 0 40px rgba(74,222,128,0.6); }
  #audioBtn {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    background: transparent; border: 1px solid #4ade80; color: #4ade80;
    padding: 6px 14px; font-size: 11px; letter-spacing: 2px; cursor: pointer;
    font-family: inherit;
  }
  #instructions {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(74,222,128,0.4); font-size: 11px; letter-spacing: 2px; text-align: center;
    pointer-events: none; z-index: 10;
  }
  #lives-display {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    font-size: 20px; z-index: 10; pointer-events: none;
  }
  #gameover {
    position: fixed; inset: 0; background: rgba(0,0,5,0.95);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200;
  }
  #gameover h2 { font-size: 52px; color: #f87171; letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 30px #ef4444; }
  #gameover p { color: #86efac; font-size: 16px; margin-bottom: 30px; }
  #restartBtn {
    padding: 12px 36px; background: transparent; border: 2px solid #4ade80;
    color: #4ade80; font-size: 13px; letter-spacing: 3px; cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">LEVEL</div><div class="stat-value" id="level">1</div></div>
  <div class="stat"><div class="stat-label">STARS</div><div class="stat-value" id="stars">0</div></div>
</div>
<div id="instructions">HOLD MOUSE / TOUCH TO BOOST GRAVITY · COLLECT STARS · AVOID COLLISION</div>
<div id="lives-display" id="lives">❤️❤️❤️</div>
<button id="audioBtn">♪ ON</button>
<div id="overlay">
  <h1>⬤</h1>
  <h1>GRAVITY ORBIT</h1>
  <p>NAVIGATE THE COSMIC WEB</p>
  <div class="sub">COLLECT STARS · SURVIVE COLLISION · BEND SPACETIME</div>
  <button id="startBtn" onclick="startGame()">LAUNCH →</button>
</div>
<div id="gameover">
  <h2>COLLAPSED</h2>
  <p id="final-score">Score: 0</p>
  <button id="restartBtn" onclick="restartGame()">RETRY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Audio
let audioCtx, audioOn = false;
function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, vol=0.15, type='sine') {
  if (!audioCtx || !audioOn) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
let bgmStep2 = 0;
const scale2 = [55,65,73,87,110,130,146,174];
setInterval(() => {
  if (!audioOn || !audioCtx) return;
  playTone(scale2[bgmStep2 % scale2.length], 0.6, 0.06, 'triangle');
  if (bgmStep2 % 3 === 0) playTone(scale2[(bgmStep2+4) % scale2.length]*2, 0.3, 0.04, 'sine');
  bgmStep2++;
}, 400);
document.getElementById('audioBtn').onclick = function() {
  if (!audioCtx) initAudio();
  audioOn = !audioOn;
  this.textContent = audioOn ? '♪ ON' : '♪ OFF';
};

// THREE setup
const canvas = document.getElementById('canvas');
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 200);
camera.position.set(0, 0, 30);

// Stars background
const starsGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000);
for (let i = 0; i < 3000; i++) starPos[i] = (Math.random()-0.5) * 200;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.7 })));

// Ambient
scene.add(new THREE.AmbientLight(0x111122, 3));

// Game state
let gameActive = false, score = 0, level = 1, lives = 3, starsCollected = 0;
let planets = [], blackHoles = [], collectibles = [], trailParticles = [];
let mouseDown = false, gravityBoost = 1;

// Black hole
function createBlackHole(x, y, mass) {
  const group = new THREE.Group();
  // Core
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  group.add(core);
  // Accretion disk
  const diskGeo = new THREE.TorusGeometry(2.5, 0.3, 8, 64);
  const diskMat = new THREE.MeshBasicMaterial({ color: 0x4ade80, transparent: true, opacity: 0.5 });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = Math.PI/4;
  group.add(disk);
  // Glow ring
  const glowGeo = new THREE.RingGeometry(1.3, 2.0, 64);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x4ade80, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(glowGeo, glowMat));
  // Point light
  const pl = new THREE.PointLight(0x4ade80, 2, 20);
  group.add(pl);
  group.position.set(x, y, 0);
  group.userData = { mass, rotSpeed: 0.02 };
  scene.add(group);
  blackHoles.push(group);
  return group;
}

// Planet (player)
let playerPlanet;
function createPlayer() {
  const geo = new THREE.SphereGeometry(0.5, 16, 16);
  const mat = new THREE.MeshPhongMaterial({
    color: 0x60a5fa, emissive: 0x1d4ed8, emissiveIntensity: 0.5,
    shininess: 100
  });
  playerPlanet = new THREE.Mesh(geo, mat);
  playerPlanet.position.set(0, 6, 0);
  playerPlanet.userData = {
    vx: 3.5, vy: 0, radius: 0.5, trail: []
  };
  const pl = new THREE.PointLight(0x60a5fa, 1.5, 8);
  playerPlanet.add(pl);
  scene.add(playerPlanet);
}

// Collectible star
function spawnStar() {
  const angle = Math.random() * Math.PI * 2;
  const dist = 4 + Math.random() * 8;
  const bh = blackHoles[Math.floor(Math.random() * blackHoles.length)];
  const sx = bh.position.x + Math.cos(angle) * dist;
  const sy = bh.position.y + Math.sin(angle) * dist;
  const geo = new THREE.OctahedronGeometry(0.3, 0);
  const mat = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
  const star = new THREE.Mesh(geo, mat);
  star.position.set(sx, sy, 0);
  star.userData = { rotSpeed: 0.05 };
  const pl = new THREE.PointLight(0xfbbf24, 1, 5);
  star.add(pl);
  scene.add(star);
  collectibles.push(star);
}

// Trail
function addTrail(pos) {
  const geo = new THREE.SphereGeometry(0.1, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.6 });
  const p = new THREE.Mesh(geo, mat);
  p.position.copy(pos);
  p.userData.life = 1;
  scene.add(p);
  trailParticles.push(p);
}

function initLevel() {
  // Clear old
  blackHoles.forEach(b => scene.remove(b));
  collectibles.forEach(c => scene.remove(c));
  trailParticles.forEach(p => scene.remove(p));
  blackHoles = []; collectibles = []; trailParticles = [];
  if (playerPlanet) scene.remove(playerPlanet);

  const bhCount = Math.min(2 + level, 5);
  const spacing = 12;
  for (let i = 0; i < bhCount; i++) {
    const angle = (i / bhCount) * Math.PI * 2;
    createBlackHole(Math.cos(angle)*spacing*0.5, Math.sin(angle)*spacing*0.5, 8 + level);
  }
  createPlayer();
  for (let i = 0; i < 5 + level; i++) spawnStar();
  starsCollected = 0;
}

// Input
window.addEventListener('mousedown', () => mouseDown = true);
window.addEventListener('mouseup', () => mouseDown = false);
window.addEventListener('touchstart', () => mouseDown = true);
window.addEventListener('touchend', () => mouseDown = false);

let frameCount = 0, lostLife = false;
function update() {
  if (!gameActive || !playerPlanet) return;
  frameCount++;
  const dt = 0.016;
  const p = playerPlanet;
  gravityBoost = mouseDown ? 2.5 : 1;

  // Gravity from black holes
  blackHoles.forEach(bh => {
    const dx = bh.position.x - p.position.x;
    const dy = bh.position.y - p.position.y;
    const dist2 = dx*dx + dy*dy;
    const dist = Math.sqrt(dist2);
    const force = (bh.userData.mass * gravityBoost) / (dist2 + 1);
    p.userData.vx += (dx/dist) * force * dt;
    p.userData.vy += (dy/dist) * force * dt;

    // Collision with black hole
    if (dist < 1.6) {
      if (!lostLife) {
        lostLife = true;
        lives--;
        playTone(60, 0.8, 0.3, 'sawtooth');
        updateHUD();
        if (lives <= 0) { endGame(); return; }
        setTimeout(() => {
          p.position.set(0, 8, 0);
          p.userData.vx = 3; p.userData.vy = 0;
          lostLife = false;
        }, 500);
      }
    }
  });

  // Speed cap
  const speed = Math.sqrt(p.userData.vx**2 + p.userData.vy**2);
  if (speed > 15) { p.userData.vx *= 15/speed; p.userData.vy *= 15/speed; }

  p.position.x += p.userData.vx * dt;
  p.position.y += p.userData.vy * dt;

  // Bounds wrap
  if (p.position.x > 20) p.position.x = -20;
  if (p.position.x < -20) p.position.x = 20;
  if (p.position.y > 14) p.position.y = -14;
  if (p.position.y < -14) p.position.y = 14;

  // Trail
  if (frameCount % 3 === 0) addTrail(p.position.clone());

  // Collect stars
  collectibles = collectibles.filter(c => {
    const dx = c.position.x - p.position.x;
    const dy = c.position.y - p.position.y;
    if (Math.sqrt(dx*dx+dy*dy) < 0.9) {
      scene.remove(c);
      starsCollected++;
      score += 10 * level;
      playTone(880, 0.2, 0.2, 'sine');
      updateHUD();
      if (collectibles.length === 1) {
        level++;
        playTone(440, 0.5, 0.3, 'triangle');
        setTimeout(initLevel, 500);
      }
      return false;
    }
    c.rotation.y += c.userData.rotSpeed;
    c.rotation.x += c.userData.rotSpeed * 0.5;
    return true;
  });

  // Trail decay
  trailParticles = trailParticles.filter(tp => {
    tp.userData.life -= 0.04;
    tp.material.opacity = tp.userData.life * 0.6;
    tp.scale.setScalar(tp.userData.life);
    if (tp.userData.life <= 0) { scene.remove(tp); return false; }
    return true;
  });
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('stars').textContent = starsCollected;
  const livesEl = document.getElementById('lives-display');
  if (livesEl) livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
}

function endGame() {
  gameActive = false;
  document.getElementById('final-score').textContent = `Score: ${score}`;
  document.getElementById('gameover').style.display = 'flex';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = 0; level = 1; lives = 3; starsCollected = 0;
  updateHUD();
  initLevel();
  gameActive = true;
  if (!audioCtx) initAudio();
}

function restartGame() {
  document.getElementById('gameover').style.display = 'none';
  score = 0; level = 1; lives = 3; starsCollected = 0;
  updateHUD();
  initLevel();
  gameActive = true;
}

let t2 = 0;
function animate() {
  requestAnimationFrame(animate);
  t2 += 0.01;
  update();
  blackHoles.forEach(bh => {
    bh.rotation.z += bh.userData.rotSpeed;
    bh.children[1] && (bh.children[1].rotation.z += 0.02);
  });
  camera.position.z = 30 + Math.sin(t2 * 0.3) * 2;
  if (playerPlanet) {
    camera.position.x += (playerPlanet.position.x * 0.1 - camera.position.x) * 0.05;
    camera.position.y += (playerPlanet.position.y * 0.05 - camera.position.y) * 0.05;
  }
  camera.lookAt(scene.position);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
