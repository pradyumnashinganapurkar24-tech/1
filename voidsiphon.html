<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Void Siphon — Become the Singularity</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Orbitron',monospace}
#hud{position:fixed;top:20px;left:20px;color:#fff;z-index:10;display:none}
#mass{font-size:36px;color:#a259ff;text-shadow:0 0 20px #a259ff}
#hi{font-size:14px;color:#888;margin-top:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,5,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff}
h1{font-size:64px;color:#a259ff;text-shadow:0 0 40px #a259ff,0 0 80px #6600ff;margin-bottom:16px;letter-spacing:4px}
.sub{font-size:16px;color:#aaa;margin:6px 0}
.btn{margin-top:32px;padding:16px 48px;background:transparent;border:2px solid #a259ff;color:#a259ff;font-size:20px;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:3px;transition:.3s;border-radius:4px}
.btn:hover{background:#a259ff;color:#000;box-shadow:0 0 30px #a259ff}
#danger{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;color:#ff3366;text-shadow:0 0 40px #ff3366;z-index:15;display:none;pointer-events:none;font-family:'Orbitron',monospace}
</style>
</head>
<body>
<div id="hud">
  <div>MASS <span id="mass">0</span></div>
  <div id="hi">BEST: <span id="best">0</span></div>
</div>
<div class="overlay" id="start">
  <h1>VOID SIPHON</h1>
  <p class="sub">You are a black hole. Absorb smaller objects to grow.</p>
  <p class="sub" style="color:#a259ff">Avoid anything larger than you.</p>
  <p class="sub" style="margin-top:12px">WASD / Arrow Keys to move</p>
  <button class="btn" onclick="startGame()">BECOME THE VOID</button>
</div>
<div class="overlay" id="dead" style="display:none">
  <h1 style="color:#ff3366;text-shadow:0 0 40px #ff3366">CONSUMED</h1>
  <p class="sub" style="font-size:24px;margin:16px">FINAL MASS: <span id="final" style="color:#a259ff">0</span></p>
  <button class="btn" style="border-color:#ff3366;color:#ff3366" onmouseover="this.style.background='#ff3366';this.style.color='#000'" onmouseout="this.style.background='transparent';this.style.color='#ff3366'" onclick="startGame()">RETRY</button>
</div>
<div id="danger">DANGER!</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
let scene,camera,renderer,player,playerR=0.8,objs=[],keys={},running=false,score=0,best=0;
let audioCtx,bgNodes=[];

function audio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  [[55,0.06],[82,0.04],[110,0.03]].forEach(([f,g])=>{
    const o=audioCtx.createOscillator(),gn=audioCtx.createGain(),lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    lfo.frequency.value=0.2;lg.gain.value=4;
    lfo.connect(lg);lg.connect(o.frequency);
    gn.gain.value=g;o.connect(gn);gn.connect(audioCtx.destination);
    o.start();lfo.start();bgNodes.push(o,lfo);
  });
}
function stopAudio(){bgNodes.forEach(n=>{try{n.stop()}catch(e){}});bgNodes=[];if(audioCtx){audioCtx.close();audioCtx=null;}}

function initScene(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x000008);
  scene.fog=new THREE.FogExp2(0x000008,0.015);
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,300);
  camera.position.set(0,18,22);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  // Stars
  const sg=new THREE.BufferGeometry(),sv=[];
  for(let i=0;i<6000;i++)sv.push((Math.random()-.5)*500,(Math.random()-.5)*500,(Math.random()-.5)*500);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.25})));

  scene.add(new THREE.AmbientLight(0x110033,3));
  const pl=new THREE.PointLight(0x6633ff,5,60);scene.add(pl);

  makePlayer();
  for(let i=0;i<35;i++)spawnObj();
}

function makePlayer(){
  if(player)scene.remove(player);
  const g=new THREE.SphereGeometry(playerR,32,32);
  const m=new THREE.MeshStandardMaterial({color:0x000000,emissive:0x330066,roughness:0,metalness:1});
  player=new THREE.Mesh(g,m);
  // rings
  [1.4,1.8,2.3].forEach((r,i)=>{
    const rg=new THREE.TorusGeometry(playerR*r,0.04+i*0.02,8,80);
    const rm=new THREE.MeshBasicMaterial({color:[0x9933ff,0x6600cc,0xaa44ff][i],transparent:true,opacity:0.8-i*0.2});
    const rt=new THREE.Mesh(rg,rm);
    rt.rotation.x=Math.PI/2*(i%2===0?1:0.6);
    player.add(rt);
  });
  scene.add(player);
}

function spawnObj(){
  const size=Math.random()*1.8+0.15;
  const cols=[0xff4466,0x44ffbb,0xffaa00,0x00ccff,0xff66aa,0x88ffff,0xffff44];
  const col=cols[Math.floor(Math.random()*cols.length)];
  const g=new THREE.SphereGeometry(size,12,12);
  const m=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.4,roughness:0.4,metalness:0.6});
  const mesh=new THREE.Mesh(g,m);
  const a=Math.random()*Math.PI*2,d=18+Math.random()*40;
  mesh.position.set(Math.cos(a)*d,(Math.random()-.5)*25,Math.sin(a)*d);
  mesh.userData={r:size,v:new THREE.Vector3((Math.random()-.5)*0.04,(Math.random()-.5)*0.02,(Math.random()-.5)*0.04)};
  scene.add(mesh);objs.push(mesh);
}

function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('dead').style.display='none';
  document.getElementById('hud').style.display='block';
  if(renderer){renderer.dispose();document.querySelector('canvas')?.remove();}
  objs=[];playerR=0.8;score=0;keys={};running=true;
  initScene();audio();
  loop();
}

let clock=new THREE.Clock();
function loop(){
  if(!running)return;
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);
  const spd=7+playerR*0.5;
  const mv=new THREE.Vector3();
  if(keys['a']||keys['ArrowLeft'])mv.x-=1;
  if(keys['d']||keys['ArrowRight'])mv.x+=1;
  if(keys['w']||keys['ArrowUp'])mv.z-=1;
  if(keys['s']||keys['ArrowDown'])mv.z+=1;
  if(mv.length())player.position.addScaledVector(mv.normalize(),spd*dt);

  // Camera follow
  camera.position.lerp(new THREE.Vector3(player.position.x,player.position.y+12+playerR*2,player.position.z+18+playerR*2),0.08);
  camera.lookAt(player.position);

  let danger=false;
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];
    const diff=new THREE.Vector3().subVectors(player.position,o.position);
    const dist=diff.length();
    // pull small toward player
    if(o.userData.r<playerR*0.9){
      const f=Math.min(0.8,(playerR*playerR)/(dist*dist+0.5));
      o.position.addScaledVector(diff.normalize(),f*dt*50);
    }
    if(o.userData.r>playerR*1.1&&dist<playerR*3+o.userData.r*2)danger=true;
    o.position.add(o.userData.v);
    o.rotation.x+=0.01;o.rotation.y+=0.008;
    // collision
    if(dist<playerR*0.85+o.userData.r*0.85){
      if(o.userData.r<playerR){
        scene.remove(o);objs.splice(i,1);
        playerR+=o.userData.r*0.08;
        makePlayer();
        score=Math.round((playerR-0.8)*120);
        document.getElementById('mass').textContent=score;
        if(score>best){best=score;document.getElementById('best').textContent=best;}
        for(let j=0;j<2;j++)spawnObj();
      } else {
        gameOver();return;
      }
    }
    // wrap
    if(o.position.distanceTo(player.position)>90){
      const a=Math.random()*Math.PI*2,d=20+Math.random()*30;
      o.position.set(player.position.x+Math.cos(a)*d,player.position.y+(Math.random()-.5)*20,player.position.z+Math.sin(a)*d);
    }
  }
  if(objs.length<25+Math.floor(score/30))spawnObj();
  document.getElementById('danger').style.display=danger?'block':'none';
  renderer.render(scene,camera);
}

function gameOver(){
  running=false;stopAudio();
  document.getElementById('hud').style.display='none';
  document.getElementById('final').textContent=score;
  document.getElementById('dead').style.display='flex';
  document.body.style.animation='shake 0.5s';
  setTimeout(()=>document.body.style.animation='',600);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;e.key==='ArrowUp'||e.key==='ArrowDown'?e.preventDefault():null;});
document.addEventListener('keyup',e=>keys[e.key]=false);
window.addEventListener('resize',()=>{if(camera&&renderer){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}});
</script>
<style>@keyframes shake{0%,100%{transform:none}25%{transform:translate(-8px,0)}75%{transform:translate(8px,0)}}</style>
</body>
</html>
