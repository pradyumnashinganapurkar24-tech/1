<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glyph Match — 3D Memory Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0820;overflow:hidden;font-family:'Quicksand',sans-serif;}
#canvas{display:block;}
#hud{position:fixed;top:16px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 28px;pointer-events:none;}
.hb{background:rgba(100,80,200,0.12);border:1px solid rgba(150,100,255,0.3);border-radius:20px;padding:8px 20px;color:#b088ff;font-size:12px;letter-spacing:2px;}
.hb span{display:block;font-size:20px;font-weight:700;color:#fff;}
#overlay{position:fixed;inset:0;background:rgba(13,8,32,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#overlay h1{font-size:clamp(36px,6vw,70px);font-weight:700;color:#b088ff;text-shadow:0 0 20px #b088ff;letter-spacing:6px;margin-bottom:6px;}
#overlay p{color:#554;font-size:12px;letter-spacing:3px;margin-bottom:36px;}
#startBtn{padding:14px 50px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;background:transparent;border:1px solid #b088ff;color:#b088ff;border-radius:30px;cursor:pointer;transition:all 0.3s;}
#startBtn:hover{background:rgba(176,136,255,0.12);box-shadow:0 0 30px rgba(176,136,255,0.4);}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:700;color:#fff;letter-spacing:4px;text-shadow:0 0 20px #b088ff;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:11px;letter-spacing:2px;}
#difficulty{position:fixed;top:80px;right:20px;display:flex;flex-direction:column;gap:6px;}
.diff-btn{padding:6px 14px;font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;background:rgba(100,80,200,0.1);border:1px solid rgba(150,100,255,0.3);border-radius:20px;color:#b088ff;cursor:pointer;transition:all 0.2s;}
.diff-btn:hover{background:rgba(150,100,255,0.2);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="hb">MOVES<span id="movesVal">0</span></div>
  <div class="hb" style="text-align:center;">MATCHES<span id="matchVal">0</span></div>
  <div class="hb" style="text-align:right;">TIME<span id="timeVal">0:00</span></div>
</div>
<div id="msg"></div>
<div id="hint">CLICK CARDS TO FLIP — MATCH ALL PAIRS</div>
<div id="overlay">
  <h1>GLYPH MATCH</h1>
  <p>3D MEMORY MATCHING GAME</p>
  <button id="startBtn" onclick="startGame()">START GAME</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='sine'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function flipSnd(){tone(600,0.06,0.1);}
function matchSnd(){[660,880,1100].forEach((f,i)=>setTimeout(()=>tone(f,0.1,0.15),i*50));}
function failSnd(){tone(220,0.12,0.2,'sawtooth');}
function winSnd(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.2,0.2),i*80));}
let bgmOn=false;
function startBGM(){if(bgmOn)return;bgmOn=true;const n=[392,0,0,329,0,392,0,0,349,0,0,392];let i=0;function s(){if(!bgmOn)return;if(n[i%n.length])tone(n[i%n.length],0.4,0.03,'sine');i++;setTimeout(s,400);}s();}

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0d0820);scene.fog=new THREE.Fog(0x0d0820,20,50);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,100);
camera.position.set(0,0,18);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0x221133,2));
const dl=new THREE.DirectionalLight(0xb088ff,2);dl.position.set(0,10,10);scene.add(dl);
const pl=new THREE.PointLight(0xb088ff,2,30);pl.position.set(0,5,5);scene.add(pl);

// Card symbols (using geometries instead of textures)
const SYMBOLS=['sphere','box','cone','torus','cylinder','octahedron','tetrahedron','dodecahedron'];
const SYMBOL_COLORS=[0xff4488,0x44aaff,0xffcc00,0x44ff88,0xff8844,0xcc44ff,0x00ffcc,0xff4444];

function makeSymbolMesh(type,col){
  const mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.4,shininess:100});
  let geo;
  if(type==='sphere')geo=new THREE.SphereGeometry(0.22,12,12);
  else if(type==='box')geo=new THREE.BoxGeometry(0.35,0.35,0.35);
  else if(type==='cone')geo=new THREE.ConeGeometry(0.2,0.4,8);
  else if(type==='torus')geo=new THREE.TorusGeometry(0.18,0.08,8,16);
  else if(type==='cylinder')geo=new THREE.CylinderGeometry(0.15,0.15,0.4,8);
  else if(type==='octahedron')geo=new THREE.OctahedronGeometry(0.25);
  else if(type==='tetrahedron')geo=new THREE.TetrahedronGeometry(0.28);
  else geo=new THREE.DodecahedronGeometry(0.22);
  return new THREE.Mesh(geo,mat);
}

// Cards
const cards=[];
let flipped=[],matched=new Set(),moves=0,matchCount=0,gameActive=false,canFlip=true,startTime=0;

const CARD_W=1.5,CARD_H=2,CARD_D=0.12;
const backMat=new THREE.MeshPhongMaterial({color:0x2a1a4a,emissive:0x0a0018,shininess:80});
const backEdgeMat=new THREE.MeshBasicMaterial({color:0x6644aa,transparent:true,opacity:0.5});

function makeCard(symIdx,x,y){
  const g=new THREE.Group();
  const back=new THREE.Mesh(new THREE.BoxGeometry(CARD_W,CARD_H,CARD_D),backMat.clone());
  back.castShadow=true;g.add(back);
  // Back pattern
  const pat=new THREE.Mesh(new THREE.PlaneGeometry(CARD_W-0.2,CARD_H-0.2),new THREE.MeshBasicMaterial({color:0x4422aa,transparent:true,opacity:0.4}));
  pat.position.z=CARD_D/2+0.001;g.add(pat);
  // Edge glow
  const edge=new THREE.Mesh(new THREE.BoxGeometry(CARD_W+0.05,CARD_H+0.05,CARD_D-0.02),new THREE.MeshBasicMaterial({color:SYMBOL_COLORS[symIdx],transparent:true,opacity:0.2}));
  g.add(edge);
  // Front face (hidden by default)
  const frontMat=new THREE.MeshPhongMaterial({color:0x1a0a30,shininess:60});
  const front=new THREE.Mesh(new THREE.PlaneGeometry(CARD_W-0.1,CARD_H-0.1),frontMat);
  front.position.z=-(CARD_D/2+0.001);front.rotation.y=Math.PI;g.add(front);
  // Symbol (hidden initially)
  const sym=makeSymbolMesh(SYMBOLS[symIdx],SYMBOL_COLORS[symIdx]);
  sym.position.z=-(CARD_D/2+0.3);sym.rotation.y=Math.PI;sym.visible=false;g.add(sym);

  g.position.set(x,y,0);
  g.userData={symIdx,flipped:false,matched:false,sym,animTarget:0,animCurrent:0};
  scene.add(g);cards.push(g);
}

function buildGrid(n){
  cards.forEach(c=>scene.remove(c));cards.length=0;
  const cols=4,rows=n/4;
  const pairs=[];
  for(let i=0;i<n/2;i++)pairs.push(i%SYMBOLS.length,i%SYMBOLS.length);
  for(let i=pairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const x=(c-1.5)*(CARD_W+0.3),y=(r-(rows-1)/2)*(CARD_H+0.3);
    makeCard(pairs[r*cols+c],x,-y);
  }
}

// Raycaster
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
document.addEventListener('click',e=>{
  if(!gameActive||!canFlip)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(cards.map(c=>c.children[0]));
  if(!hits.length)return;
  const card=hits[0].object.parent;
  if(card.userData.flipped||card.userData.matched)return;
  flipCard(card);
});

function flipCard(card){
  card.userData.flipped=true;
  card.userData.animTarget=Math.PI;
  card.userData.sym.visible=true;
  flipSnd();flipped.push(card);
  if(flipped.length===2){
    moves++;document.getElementById('movesVal').textContent=moves;
    canFlip=false;
    setTimeout(checkMatch,800);
  }
}

function checkMatch(){
  const[a,b]=flipped;
  if(a.userData.symIdx===b.userData.symIdx){
    a.userData.matched=b.userData.matched=true;
    matchCount++;document.getElementById('matchVal').textContent=matchCount;
    matchSnd();
    if(matchCount===cards.length/2){winSnd();showMsg('PERFECT! 🎉');bgmOn=false;}
  } else {
    failSnd();
    a.userData.flipped=b.userData.flipped=false;
    a.userData.animTarget=b.userData.animTarget=0;
    setTimeout(()=>{a.userData.sym.visible=b.userData.sym.visible=false;},200);
  }
  flipped=[];canFlip=true;
}

function showMsg(t,d=2000){const el=document.getElementById('msg');el.textContent=t;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,d);}

function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('overlay').style.display='none';
  moves=0;matchCount=0;gameActive=true;canFlip=true;flipped=[];
  buildGrid(16);startTime=Date.now();startBGM();
  document.getElementById('movesVal').textContent=0;document.getElementById('matchVal').textContent=0;
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(!gameActive){renderer.render(scene,camera);return;}

  // Timer
  const elapsed=Date.now()-startTime;const s=Math.floor(elapsed/1000)%60,m=Math.floor(elapsed/60000);
  document.getElementById('timeVal').textContent=`${m}:${String(s).padStart(2,'0')}`;

  // Animate card flips
  cards.forEach(c=>{
    const target=c.userData.animTarget;const cur=c.userData.animCurrent;
    c.userData.animCurrent+=( target-cur)*0.15;
    c.rotation.y=c.userData.animCurrent;
    if(c.userData.matched){c.position.z=Math.sin(Date.now()*0.002+c.position.x)*0.05;c.children[2].material.opacity=0.3+Math.sin(Date.now()*0.004)*0.1;}
    if(c.userData.sym.visible)c.userData.sym.rotation.y+=0.03;
  });

  pl.position.x=Math.sin(Date.now()*0.001)*5;pl.position.y=Math.cos(Date.now()*0.0013)*3;
  pl.intensity=1.5+Math.sin(Date.now()*0.005)*0.5;

  // Subtle camera sway
  camera.position.x=Math.sin(Date.now()*0.0003)*0.5;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
