<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Beat Drop — 3D Rhythm Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080008;overflow:hidden;font-family:'Bungee',cursive;}
#canvas{display:block;}
#hud{position:fixed;top:16px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 28px;pointer-events:none;}
.hb{background:rgba(180,0,255,0.1);border:1px solid rgba(180,0,255,0.3);border-radius:8px;padding:10px 20px;color:#cc44ff;font-size:12px;letter-spacing:2px;}
.hb span{display:block;font-size:20px;font-weight:700;color:#fff;}
#combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#fff;letter-spacing:4px;text-shadow:0 0 20px #cc44ff;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#key-labels{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:12px;}
.key-zone{width:90px;height:90px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:rgba(255,255,255,0.5);transition:all 0.1s;cursor:pointer;}
.key-zone.hit{transform:scale(0.9);}
#overlay{position:fixed;inset:0;background:rgba(8,0,8,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#overlay h1{font-size:clamp(40px,7vw,80px);color:#cc44ff;text-shadow:0 0 30px #cc44ff,0 0 60px #8800ff;letter-spacing:6px;margin-bottom:6px;}
#overlay p{color:#555;font-size:13px;letter-spacing:3px;margin-bottom:36px;}
#startBtn{padding:14px 50px;font-family:'Bungee',cursive;font-size:16px;letter-spacing:4px;background:transparent;border:2px solid #cc44ff;color:#cc44ff;border-radius:6px;cursor:pointer;transition:all 0.3s;}
#startBtn:hover{background:rgba(204,68,255,0.12);box-shadow:0 0 40px rgba(204,68,255,0.5);}
#accuracy{position:fixed;top:50%;left:50%;transform:translate(-50%,30px);font-size:22px;color:#ffcc00;letter-spacing:3px;opacity:0;transition:opacity 0.2s;pointer-events:none;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="hb">SCORE<span id="scoreVal">0</span></div>
  <div class="hb" style="text-align:center;">COMBO<span id="comboVal">x0</span></div>
  <div class="hb" style="text-align:right;">MAX COMBO<span id="maxVal">0</span></div>
</div>
<div id="combo-display"></div>
<div id="accuracy"></div>
<div id="key-labels">
  <div class="key-zone" id="kz0" style="border-color:#ff4488;" onclick="tap(0)">A</div>
  <div class="key-zone" id="kz1" style="border-color:#44aaff;" onclick="tap(1)">S</div>
  <div class="key-zone" id="kz2" style="border-color:#ffcc00;" onclick="tap(2)">D</div>
  <div class="key-zone" id="kz3" style="border-color:#44ff88;" onclick="tap(3)">F</div>
</div>
<div id="overlay">
  <h1>BEAT DROP</h1>
  <p>3D RHYTHM — HIT THE BEATS!</p>
  <button id="startBtn" onclick="startGame()">DROP THE BEAT</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.2,t='sine'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}

const LANE_FREQS=[261,329,392,523];
function hitNote(lane){tone(LANE_FREQS[lane],0.15,0.3);}
function missNote(){tone(120,0.1,0.2,'sawtooth');}

function startBGM(){
  const bpm=128,beat=60/bpm;
  const kick=()=>{tone(60,0.2,0.4,'sine');tone(80,0.1,0.3,'sine');};
  const snare=()=>{const b=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=AC.createBufferSource(),g=AC.createGain();s.buffer=b;s.connect(g);g.connect(AC.destination);g.gain.value=0.2;s.start();};
  const hihat=()=>{tone(8000,0.04,0.05,'square');};
  let bar=0;
  function loop(){
    const now=AC.currentTime;
    kick(); hihat();
    setTimeout(hihat,beat*500*0.5);
    setTimeout(snare,beat*1000);
    setTimeout(hihat,beat*1000*1.5);
    bar++;
    setTimeout(loop,beat*2000);
  }
  loop();
}

// Three.js
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x080008);scene.fog=new THREE.Fog(0x080008,30,80);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,200);
camera.position.set(0,4,14);camera.lookAt(0,0,-10);

scene.add(new THREE.AmbientLight(0x220033,2));
const dl=new THREE.DirectionalLight(0xcc44ff,2);dl.position.set(0,10,5);scene.add(dl);

// Track lanes
const LANES=4;const LANE_X=[-3,-1,1,3];
const LANE_COLORS=[0xff4488,0x44aaff,0xffcc00,0x44ff88];

// Track floor
const trackMat=new THREE.MeshPhongMaterial({color:0x110011,shininess:30});
const track=new THREE.Mesh(new THREE.BoxGeometry(10,0.1,60),trackMat);
track.position.set(0,-0.5,-20);track.receiveShadow=true;scene.add(track);

// Lane dividers
LANE_X.forEach((x,i)=>{
  const line=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.05,60),new THREE.MeshBasicMaterial({color:LANE_COLORS[i],transparent:true,opacity:0.3}));
  line.position.set(x-1,0,-20);scene.add(line);
});

// Hit zone rings
const hitZones=[];
LANE_X.forEach((x,i)=>{
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.06,8,24),new THREE.MeshBasicMaterial({color:LANE_COLORS[i]}));
  ring.rotation.x=Math.PI/2;ring.position.set(x,0,6);scene.add(ring);
  hitZones.push(ring);
});

// Point lights per lane
LANE_X.forEach((x,i)=>{
  const pl=new THREE.PointLight(LANE_COLORS[i],1.5,8);pl.position.set(x,1,6);scene.add(pl);
});

// Notes
const notes=[];
function spawnNote(lane){
  const geo=new THREE.BoxGeometry(0.7,0.15,0.7);
  const mat=new THREE.MeshPhongMaterial({color:LANE_COLORS[lane],emissive:LANE_COLORS[lane],emissiveIntensity:0.4,shininess:100});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(LANE_X[lane],0,-30);
  mesh.castShadow=true;scene.add(mesh);
  notes.push({mesh,lane,hit:false,missed:false});
}

// Particles on hit
const particles=[];
function burst(pos,col){for(let i=0;i<10;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.06,4,4),new THREE.MeshBasicMaterial({color:col}));m.position.copy(pos);const v=new THREE.Vector3((Math.random()-0.5),(Math.random()+0.5)*0.2,(Math.random()-0.5)).multiplyScalar(0.2);particles.push({mesh:m,vel:v,life:25});scene.add(m);}}

// State
let score=0,combo=0,maxCombo=0,gameActive=false,spawnTimer=0,noteSpeed=0.18;
const BPM=128,BEAT_INTERVAL=60000/BPM;
let lastBeat=0;

const PATTERNS=[[0],[1],[2],[3],[0,2],[1,3],[0,1],[2,3],[0],[3],[1],[2]];
let patIdx=0;

function tap(lane){
  if(!gameActive)return;
  const kz=document.getElementById('kz'+lane);
  kz.classList.add('hit');setTimeout(()=>kz.classList.remove('hit'),100);
  hitNote(lane);

  // Find closest note in lane
  let closest=null,closestZ=Infinity;
  notes.forEach(n=>{if(!n.hit&&!n.missed&&n.lane===lane){const dz=Math.abs(n.mesh.position.z-6);if(dz<closestZ){closestZ=dz;closest=n;}}});

  if(closest&&closestZ<2){
    closest.hit=true;
    scene.remove(closest.mesh);
    burst(closest.mesh.position,LANE_COLORS[lane]);
    const acc=closestZ<0.5?'PERFECT':closestZ<1?'GREAT':'GOOD';
    const pts=acc==='PERFECT'?300:acc==='GREAT'?200:100;
    combo++;score+=(pts*(1+combo*0.1))|0;maxCombo=Math.max(maxCombo,combo);
    updateHUD();showAcc(acc,acc==='PERFECT'?'#ffcc00':acc==='GREAT'?'#44ff88':'#44aaff');
  } else {
    combo=0;updateHUD();showAcc('MISS','#ff4444');missNote();
  }
}

function showAcc(t,col){
  const el=document.getElementById('accuracy');el.textContent=t;el.style.color=col;el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,600);
}
function updateHUD(){
  document.getElementById('scoreVal').textContent=Math.round(score);
  document.getElementById('comboVal').textContent='x'+combo;
  document.getElementById('maxVal').textContent=maxCombo;
  if(combo>4){const cd=document.getElementById('combo-display');cd.textContent=combo+'x COMBO';cd.style.opacity=1;setTimeout(()=>cd.style.opacity=0,500);}
}

document.addEventListener('keydown',e=>{
  if(e.code==='KeyA')tap(0);if(e.code==='KeyS')tap(1);if(e.code==='KeyD')tap(2);if(e.code==='KeyF')tap(3);
});

function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('overlay').style.display='none';
  gameActive=true;score=0;combo=0;maxCombo=0;
  notes.forEach(n=>scene.remove(n.mesh));notes.length=0;
  startBGM();updateHUD();
}

const clock=new THREE.Clock();
let beatTimer=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(!gameActive){renderer.render(scene,camera);return;}

  beatTimer+=dt*1000;
  if(beatTimer>=BEAT_INTERVAL){
    beatTimer=0;
    const pat=PATTERNS[patIdx%PATTERNS.length];
    pat.forEach(l=>spawnNote(l));patIdx++;
  }

  // Move notes
  for(let i=notes.length-1;i>=0;i--){
    const n=notes[i];
    if(n.hit)continue;
    n.mesh.position.z+=noteSpeed;
    n.mesh.rotation.y+=0.05;
    if(n.mesh.position.z>10){
      if(!n.missed&&!n.hit){n.missed=true;combo=0;updateHUD();missNote();}
      scene.remove(n.mesh);notes.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.mesh.position.add(p.vel);p.vel.y-=0.01;p.life--;if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}}

  // Hit zone pulse
  hitZones.forEach((hz,i)=>{hz.scale.setScalar(1+Math.sin(Date.now()*0.008+i)*0.05);});

  // Floor glow
  const t2=Date.now()*0.002;
  track.material.emissive=new THREE.Color(0.05+Math.sin(t2)*0.03,0,0.08+Math.sin(t2+1)*0.04);
  track.material.emissiveIntensity=1;

  // Camera bob
  camera.position.y=4+Math.sin(Date.now()*0.003)*0.1;

  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
