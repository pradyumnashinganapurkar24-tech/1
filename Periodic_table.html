<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Periodic Table</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --panel-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Periodic Table Grid */
        .table-wrapper {
            width: 100%;
            max-width: 1300px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(55px, 1fr));
            grid-template-rows: repeat(10, 65px);
            gap: 4px;
            min-width: 1050px;
        }

        .element {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.5), 
                inset 0 -2px 4px rgba(0, 0, 0, 0.4), 
                0 4px 0px rgba(0, 0, 0, 0.5),
                0 6px 8px rgba(0, 0, 0, 0.4);
            transform: translateY(0);
        }

        .element::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .element:hover {
            transform: scale(1.15) translateY(-6px);
            z-index: 10;
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.7), 
                inset 0 -4px 8px rgba(0, 0, 0, 0.5), 
                0 10px 0px rgba(0, 0, 0, 0.5),
                0 15px 25px rgba(0, 0, 0, 0.6);
            border-color: #fff;
            filter: brightness(1.15);
        }

        .element:active {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.6), 
                inset 0 -2px 4px rgba(0, 0, 0, 0.6), 
                0 4px 0px rgba(0, 0, 0, 0.6),
                0 6px 12px rgba(0, 0, 0, 0.5);
        }

        .atomic-num {
            font-size: 0.7rem;
            opacity: 0.9;
            font-weight: bold;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .symbol {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 0.55rem;
            text-align: center;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Group Colors */
        .alkali { background-color: #ef4444; background-image: linear-gradient(145deg, #f87171, #b91c1c); }
        .alkaline { background-color: #f97316; background-image: linear-gradient(145deg, #fb923c, #c2410c); }
        .transition { background-color: #eab308; background-image: linear-gradient(145deg, #facc15, #a16207); color: #111; }
        .transition .atomic-num, .transition .symbol, .transition .name { text-shadow: 0 1px 1px rgba(255,255,255,0.4); }
        .post-transition { background-color: #84cc16; background-image: linear-gradient(145deg, #a3e635, #4d7c0f); color: #111; }
        .post-transition .atomic-num, .post-transition .symbol, .post-transition .name { text-shadow: 0 1px 1px rgba(255,255,255,0.4); }
        .metalloid { background-color: #10b981; background-image: linear-gradient(145deg, #34d399, #047857); }
        .nonmetal { background-color: #06b6d4; background-image: linear-gradient(145deg, #22d3ee, #0e7490); }
        .halogen { background-color: #3b82f6; background-image: linear-gradient(145deg, #60a5fa, #1d4ed8); }
        .noble { background-color: #8b5cf6; background-image: linear-gradient(145deg, #a78bfa, #5b21b6); }
        .lanthanide { background-color: #d946ef; background-image: linear-gradient(145deg, #e879f9, #86198f); }
        .actinide { background-color: #f43f5e; background-image: linear-gradient(145deg, #fb7185, #be123c); }
        .unknown { background-color: #64748b; background-image: linear-gradient(145deg, #94a3b8, #334155); }

        /* Detail & 3D Panel Layout */
        .detail-container {
            margin-top: 20px;
            width: 100%;
            max-width: 1000px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            min-height: 400px;
        }

        .info-panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border-color);
        }

        .info-panel h2 {
            margin: 0 0 5px 0;
            font-size: 2.8rem;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .info-panel h2 span {
            font-size: 1.4rem;
            opacity: 0.7;
            font-weight: normal;
        }

        .info-panel .data-row {
            margin: 8px 0;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
        }

        .info-panel .data-label {
            color: #94a3b8;
        }

        #canvas-container {
            flex: 1.5;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        @media (max-width: 768px) {
            .detail-container {
                flex-direction: column;
            }

            .info-panel {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 20px;
            }

            #canvas-container {
                min-height: 300px;
            }
        }
    </style>
</head>

<body>

    <h1>Interactive 3D Periodic Table</h1>

    <div class="table-wrapper">
        <div class="periodic-table" id="periodic-table"></div>
    </div>

    <div class="detail-container">
        <div class="info-panel" id="info-panel">
            <h2 id="el-title">Select Element</h2>
            <p style="color: #94a3b8;">Click any element in the grid above to view its chemical properties and interact
                with its 3D atomic structure.</p>
        </div>
        <div id="canvas-container"></div>
    </div>

    <script>

        const elementsData = [

            [35, "Br", "Bromine", "79.904", 17, 4, "halogen"], [36, "Kr", "Krypton", "83.798", 18, 4, "noble"],

            [45, "Rh", "Rhodium", "102.91", 9, 5, "transition"], [46, "Pd", "Palladium", "106.42", 10, 5, "transition"],
            [47, "Ag", "Silver", "107.87", 11, 5, "transition"], [48, "Cd", "Cadmium", "112.41", 12, 5, "transition"],
            [49, "In", "Indium", "114.82", 13, 5, "post-transition"], [50, "Sn", "Tin", "118.71", 14, 5, "post-transition"],
            [51, "Sb", "Antimony", "121.76", 15, 5, "metalloid"], [52, "Te", "Tellurium", "127.60", 16, 5, "metalloid"],
            [53, "I", "Iodine", "126.90", 17, 5, "halogen"], [54, "Xe", "Xenon", "131.29", 18, 5, "noble"],
            [55, "Cs", "Cesium", "132.91", 1, 6, "alkali"], [56, "Ba", "Barium", "137.33", 2, 6, "alkaline"],
            // Lanthanides (Row 9)
            [57, "La", "Lanthanum", "138.91", 4, 9, "lanthanide"], [58, "Ce", "Cerium", "140.12", 5, 9, "lanthanide"],
            [59, "Pr", "Praseodymium", "140.91", 6, 9, "lanthanide"], [60, "Nd", "Neodymium", "144.24", 7, 9, "lanthanide"],

            [67, "Ho", "Holmium", "164.93", 14, 9, "lanthanide"], [68, "Er", "Erbium", "167.26", 15, 9, "lanthanide"],
            [69, "Tm", "Thulium", "168.93", 16, 9, "lanthanide"], [70, "Yb", "Ytterbium", "173.05", 17, 9, "lanthanide"],
            [71, "Lu", "Lutetium", "174.97", 18, 9, "lanthanide"],
            // Main Body Row 6
            [72, "Hf", "Hafnium", "178.49", 4, 6, "transition"], [73, "Ta", "Tantalum", "180.95", 5, 6, "transition"],
            [74, "W", "Tungsten", "183.84", 6, 6, "transition"], [75, "Re", "Rhenium", "186.21", 7, 6, "transition"],
            [76, "Os", "Osmium", "190.23", 8, 6, "transition"], [77, "Ir", "Iridium", "192.22", 9, 6, "transition"],
            [78, "Pt", "Platinum", "195.08", 10, 6, "transition"], [79, "Au", "Gold", "196.97", 11, 6, "transition"],
            [80, "Hg", "Mercury", "200.59", 12, 6, "transition"], [81, "Tl", "Thallium", "204.38", 13, 6, "post-transition"],
            [82, "Pb", "Lead", "207.2", 14, 6, "post-transition"], [83, "Bi", "Bismuth", "208.98", 15, 6, "post-transition"],
            [84, "Po", "Polonium", "(209)", 16, 6, "metalloid"], [85, "At", "Astatine", "(210)", 17, 6, "halogen"],
            [86, "Rn", "Radon", "(222)", 18, 6, "noble"],
            [87, "Fr", "Francium", "(223)", 1, 7, "alkali"], [88, "Ra", "Radium", "(226)", 2, 7, "alkaline"],
            // Actinides (Row 10)
            [89, "Ac", "Actinium", "(227)", 4, 10, "actinide"], [90, "Th", "Thorium", "232.04", 5, 10, "actinide"],
            [91, "Pa", "Protactinium", "231.04", 6, 10, "actinide"], [92, "U", "Uranium", "238.03", 7, 10, "actinide"],
            [93, "Np", "Neptunium", "(237)", 8, 10, "actinide"], [94, "Pu", "Plutonium", "(244)", 9, 10, "actinide"],
            [95, "Am", "Americium", "(243)", 10, 10, "actinide"], [96, "Cm", "Curium", "(247)", 11, 10, "actinide"],
            [97, "Bk", "Berkelium", "(247)", 12, 10, "actinide"], [98, "Cf", "Californium", "(251)", 13, 10, "actinide"],
            [99, "Es", "Einsteinium", "(252)", 14, 10, "actinide"], [100, "Fm", "Fermium", "(257)", 15, 10, "actinide"],
            [101, "Md", "Mendelevium", "(258)", 16, 10, "actinide"], [102, "No", "Nobelium", "(259)", 17, 10, "actinide"],
            [103, "Lr", "Lawrencium", "(262)", 18, 10, "actinide"],
            // Main Body Row 7
            [104, "Rf", "Rutherfordium", "(267)", 4, 7, "transition"], [105, "Db", "Dubnium", "(268)", 5, 7, "transition"],
            [106, "Sg", "Seaborgium", "(269)", 6, 7, "transition"], [107, "Bh", "Bohrium", "(270)", 7, 7, "transition"],
            [108, "Hs", "Hassium", "(277)", 8, 7, "transition"], [109, "Mt", "Meitnerium", "(278)", 9, 7, "unknown"],
            [110, "Ds", "Darmstadtium", "(281)", 10, 7, "unknown"], [111, "Rg", "Roentgenium", "(282)", 11, 7, "unknown"],
            [112, "Cn", "Copernicium", "(285)", 12, 7, "transition"], [113, "Nh", "Nihonium", "(286)", 13, 7, "post-transition"],
            [114, "Fl", "Flerovium", "(289)", 14, 7, "post-transition"], [115, "Mc", "Moscovium", "(290)", 15, 7, "post-transition"],
            [116, "Lv", "Livermorium", "(293)", 16, 7, "post-transition"], [117, "Ts", "Tennessine", "(294)", 17, 7, "halogen"],
            [118, "Og", "Oganesson", "(294)", 18, 7, "noble"]
        ];

        // 1. Build the HTML Grid
        const tableContainer = document.getElementById('periodic-table');
        const infoPanel = document.getElementById('info-panel');
        let activeElementData = null;

        // Audio Setup
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playHoverSound() {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playClickSound(category) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            let startFreq = 300, endFreq = 100, duration = 0.15, volume = 0.05;
            osc.type = 'triangle';

            switch(category) {
                case 'alkali': osc.type = 'square'; startFreq = 800; endFreq = 400; duration = 0.1; break;
                case 'alkaline': osc.type = 'square'; startFreq = 600; endFreq = 300; duration = 0.15; break;
                case 'transition': osc.type = 'sawtooth'; startFreq = 200; endFreq = 100; duration = 0.3; volume = 0.03; break;
                case 'post-transition': osc.type = 'sawtooth'; startFreq = 250; endFreq = 150; duration = 0.25; volume = 0.03; break;
                case 'metalloid': osc.type = 'triangle'; startFreq = 400; endFreq = 200; duration = 0.2; break;
                case 'nonmetal': osc.type = 'sine'; startFreq = 500; endFreq = 500; duration = 0.2; break;
                case 'halogen': osc.type = 'square'; startFreq = 900; endFreq = 100; duration = 0.1; break;
                case 'noble': osc.type = 'sine'; startFreq = 400; endFreq = 400; duration = 0.5; volume = 0.03; break;
                case 'lanthanide': 
                case 'actinide': osc.type = 'sawtooth'; startFreq = 100; endFreq = 50; duration = 0.4; volume = 0.04; break;
            }

            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playAtomGenerateSound(atomicNumber) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150 + atomicNumber * 2, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        elementsData.forEach(data => {
            const [atomicNum, symbol, name, mass, col, row, category] = data;
            const div = document.createElement('div');
            div.className = `element ${category}`;
            div.style.gridColumn = col;
            div.style.gridRow = row;

            div.innerHTML = `
                <div class="atomic-num">${atomicNum}</div>
                <div class="symbol">${symbol}</div>
                <div class="name">${name}</div>
            `;

            div.addEventListener('mouseenter', () => {
                playHoverSound();
            });

            div.addEventListener('click', () => {
                playClickSound(category);
                activeElementData = data;
                updateInfoPanel(div);
                build3DAtom(atomicNum);
            });

            tableContainer.appendChild(div);
        });

        function updateInfoPanel(clickedDiv) {
            if (!activeElementData) return;
            const [num, sym, name, mass, col, row, cat] = activeElementData;
            const groupStr = cat.charAt(0).toUpperCase() + cat.slice(1).replace('-', ' ');
            const bgColor = window.getComputedStyle(clickedDiv).backgroundColor;

            // Calculate extra info
            const shells = calculateShells(num);
            const electronConfig = shells.join(', ');
            
            // Standard State estimation
            let standardState = "Solid";
            const gasses = [1, 2, 7, 8, 9, 10, 17, 18, 36, 54, 86, 118];
            const liquids = [35, 80]; // Bromine, Mercury
            if (gasses.includes(num)) standardState = "Gas";
            else if (liquids.includes(num)) standardState = "Liquid";
            else if (num > 103) standardState = "Unknown / Synthetic";

            // Determine block
            let block = 's';
            if (cat === 'lanthanide' || cat === 'actinide') block = 'f';
            else if (col >= 13 && col <= 18 && num !== 2) block = 'p'; // He is s-block
            else if (col >= 3 && col <= 12) block = 'd';

            let massVal = mass.replace(/[()]/g, '');
            let neutrons = Math.round(parseFloat(massVal)) - num;
            if(isNaN(neutrons)) neutrons = "Unknown";

            infoPanel.innerHTML = `
                <h2 style="color: ${bgColor}">${sym} <span>${name}</span></h2>
                <div class="data-row"><span class="data-label">Atomic Number</span> <span>${num}</span></div>
                <div class="data-row"><span class="data-label">Atomic Mass</span> <span>${mass} u</span></div>
                <div class="data-row"><span class="data-label">Chemical Group</span> <span>${groupStr}</span></div>
                <div class="data-row"><span class="data-label">Standard State</span> <span>${standardState}</span></div>
                <div class="data-row"><span class="data-label">Electron Config</span> <span>[ ${electronConfig} ]</span></div>
                <div class="data-row"><span class="data-label">Protons / Electrons</span> <span>${num}</span></div>
                <div class="data-row"><span class="data-label">Neutrons</span> <span>${neutrons}</span></div>
                <div class="data-row"><span class="data-label">Block</span> <span>${block}-block</span></div>
            `;
        }

        // 2. Three.js Engine Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        let atomGroup = new THREE.Group();
        scene.add(atomGroup);
        let electronObjects = [];

        // Simple algorithm to estimate shell structure for visualization
        function calculateShells(atomicNumber) {
            const maxElectrons = [2, 8, 18, 32, 32, 18, 8];
            let shells = [];
            let remaining = atomicNumber;
            for (let i = 0; i < maxElectrons.length; i++) {
                if (remaining <= 0) break;
                let take = Math.min(remaining, maxElectrons[i]);
                shells.push(take);
                remaining -= take;
            }
            return shells;
        }

        function build3DAtom(atomicNumber) {
            playAtomGenerateSound(atomicNumber);

            // Clear existing geometry
            while (atomGroup.children.length > 0) {
                atomGroup.remove(atomGroup.children[0]);
            }
            electronObjects = [];
            atomGroup.rotation.set(0, 0, 0); // Reset rotation

            const shells = calculateShells(atomicNumber);

            // Create Nucleus
            const nucGeo = new THREE.SphereGeometry(1.5, 32, 32);
            const nucMat = new THREE.MeshPhongMaterial({ color: 0xff3366, shininess: 100 });
            const nucleus = new THREE.Mesh(nucGeo, nucMat);
            atomGroup.add(nucleus);

            // Create Shells & Electrons
            const eGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const eMat = new THREE.MeshPhongMaterial({ color: 0x00d8ff, emissive: 0x0055ff });
            const ringMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });

            shells.forEach((electronCount, shellIndex) => {
                const radius = 3.5 + (shellIndex * 2.2);

                // Create Orbit Ring
                const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
                const points = curve.getPoints(64);
                const ringGeo = new THREE.BufferGeometry().setFromPoints(points);
                const ring = new THREE.Line(ringGeo, ringMat);

                // Tilt the ring for a true 3D look
                const axisTiltX = Math.random() * Math.PI;
                const axisTiltY = Math.random() * Math.PI;
                ring.rotation.x = axisTiltX;
                ring.rotation.y = axisTiltY;
                atomGroup.add(ring);

                // Add electrons to this shell
                for (let i = 0; i < electronCount; i++) {
                    const electron = new THREE.Mesh(eGeo, eMat);
                    const angle = (i / electronCount) * Math.PI * 2;

                    // We attach the electron to the rotated ring to maintain the correct orbital path
                    const pivot = new THREE.Group();
                    pivot.rotation.x = axisTiltX;
                    pivot.rotation.y = axisTiltY;

                    electron.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
                    pivot.add(electron);
                    atomGroup.add(pivot);

                    electronObjects.push({
                        pivot: pivot,
                        electron: electron,
                        angle: angle,
                        radius: radius,
                        speed: 0.03 - (shellIndex * 0.003) // Inner electrons move faster
                    });
                }
            });
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Move electrons along their orbits
            electronObjects.forEach(obj => {
                obj.angle += obj.speed;
                obj.electron.position.x = Math.cos(obj.angle) * obj.radius;
                obj.electron.position.y = Math.sin(obj.angle) * obj.radius;
            });

            // Slowly rotate the entire atom for better 3D perspective
            atomGroup.rotation.x += 0.002;
            atomGroup.rotation.y += 0.003;

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Start animation loop
        animate();

        // Optional: Pre-select Hydrogen on load
        build3DAtom(1);

    </script>
</body>
