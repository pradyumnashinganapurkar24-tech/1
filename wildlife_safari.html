<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Safari - 3D Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffaa00; --bg: #0a0a0a; --glass: rgba(20, 20, 20, 0.7); }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Outfit', sans-serif; color: #fff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: flex; }
        
        .sidebar { width: 300px; height: 100vh; background: var(--glass); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .sidebar h1 { font-size: 28px; margin: 0 0 20px 0; font-weight: 600; background: linear-gradient(90deg, #ffaa00, #ff5500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px 20px; text-align: left; font-size: 18px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; font-family: 'Outfit', sans-serif; }
        .nav-btn:hover { background: rgba(255,170,0,0.2); border-color: var(--accent); transform: translateX(5px); }
        .nav-btn.active { background: var(--accent); color: #000; font-weight: 600; box-shadow: 0 0 20px rgba(255,170,0,0.4); }

        .info-panel { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); width: 350px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; pointer-events: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease; transform: translateY(-40%); }
        .info-panel.visible { opacity: 1; transform: translateY(-50%); }
        .info-panel h2 { margin: 0 0 10px 0; font-size: 32px; color: var(--accent); }
        .info-panel h4 { margin: 0 0 20px 0; font-weight: 300; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        .info-panel p { line-height: 1.6; font-weight: 300; font-size: 16px; margin-bottom: 20px; color: #ddd; }
        
        .stat-bar { margin-bottom: 15px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #888; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s cubic-bezier(0.1, 0.8, 0.2, 1); }

        #loading { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <div id="loading">Initializing Safari Engine...</div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="sidebar">
            <h1>Wildlife Safari</h1>
            <button class="nav-btn" data-id="cheetah">Cheetah</button>
            <button class="nav-btn" data-id="elephant">Elephant</button>
            <button class="nav-btn" data-id="giraffe">Giraffe</button>
            <button class="nav-btn" data-id="rhino">Rhino</button>
            <button class="nav-btn" data-id="zebra">Zebra</button>
            <button class="nav-btn" data-id="hippo">Hippo</button>
        </div>

        <div class="info-panel" id="infoBox">
            <h2 id="infoTitle">Animal</h2>
            <h4 id="infoSub">Scientific Name</h4>
            <p id="infoDesc">Description goes here.</p>
            
            <div class="stat-bar">
                <div class="stat-label"><span>Speed</span><span id="stat1-val">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="stat1-bar"></div></div>
            </div>
            <div class="stat-bar">
                <div class="stat-label"><span>Weight</span><span id="stat2-val">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="stat2-bar"></div></div>
            </div>
            <div class="stat-bar">
                <div class="stat-label"><span>Lifespan</span><span id="stat3-val">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="stat3-bar"></div></div>
            </div>
        </div>
    </div>

    <script>
        // --- Audio Engine ---
        const AudioEngine = {
            ctx: null,
            init() {
                if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(this.ctx.state === 'suspended') this.ctx.resume();
            },
            playClick() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playSwoosh() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
        };

        // --- Animal Data ---
        const Database = {
            cheetah: {
                title: "Cheetah", sub: "Acinonyx jubatus",
                desc: "The cheetah is a large cat native to Africa and central Iran. It is the fastest land animal, capable of running at 80 to 128 km/h.",
                stats: [ {l:"Top Speed", v:"120 km/h", p:100}, {l:"Weight", v:"72 kg", p:20}, {l:"Lifespan", v:"12 Years", p:40} ],
                color: 0xffaa00, accent: '#ffaa00'
            },
            elephant: {
                title: "Elephant", sub: "Loxodonta africana",
                desc: "African elephants are the largest land animals on Earth. They are highly intelligent and possess complex social structures.",
                stats: [ {l:"Top Speed", v:"40 km/h", p:30}, {l:"Weight", v:"6,000 kg", p:100}, {l:"Lifespan", v:"70 Years", p:90} ],
                color: 0x8899aa, accent: '#8899aa'
            },
            giraffe: {
                title: "Giraffe", sub: "Giraffa camelopardalis",
                desc: "The giraffe is an African artiodactyl mammal, the tallest living terrestrial animal and the largest ruminant.",
                stats: [ {l:"Top Speed", v:"60 km/h", p:50}, {l:"Weight", v:"1,900 kg", p:60}, {l:"Lifespan", v:"25 Years", p:60} ],
                color: 0xffcc44, accent: '#ffcc44'
            },
            rhino: {
                title: "Rhino", sub: "Diceros bicornis",
                desc: "Rhinoceroses are large, herbivorous mammals identified by their characteristic horned snouts. They are extremely strong and fast.",
                stats: [ {l:"Top Speed", v:"55 km/h", p:45}, {l:"Weight", v:"2,300 kg", p:70}, {l:"Lifespan", v:"40 Years", p:70} ],
                color: 0x777777, accent: '#999999'
            },
            zebra: {
                title: "Zebra", sub: "Equus quagga",
                desc: "Zebras are African equines with distinctive black-and-white striped coats. Their stripes come in different patterns, unique to each individual.",
                stats: [ {l:"Top Speed", v:"65 km/h", p:55}, {l:"Weight", v:"400 kg", p:35}, {l:"Lifespan", v:"25 Years", p:60} ],
                color: 0xffffff, accent: '#ffffff'
            },
            hippo: {
                title: "Hippo", sub: "Hippopotamus amphibius",
                desc: "The hippopotamus is a large, mostly herbivorous mammal in sub-Saharan Africa. They are highly aggressive and incredibly dangerous.",
                stats: [ {l:"Top Speed", v:"30 km/h", p:25}, {l:"Weight", v:"1,500 kg", p:55}, {l:"Lifespan", v:"40 Years", p:70} ],
                color: 0x4a4a5a, accent: '#666688'
            }
        };

        // --- 3D Engine Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(20, 10, 25);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        
        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(15, 20, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        scene.add(spotLight);

        const fillLight = new THREE.DirectionalLight(0x5555ff, 0.5);
        fillLight.position.set(-10, 10, -10);
        scene.add(fillLight);

        // Environment (Grid)
        const gridHelper = new THREE.GridHelper(50, 50, 0x333333, 0x111111);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // --- Procedural Animal Builders ---
        const models = {};
        
        function createCheetah() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.8 });
            const spotMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), mat);
            body.position.y = 2.5; body.castShadow = true; group.add(body);
            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.5), mat);
            head.position.set(0, 3.2, 2.5); head.castShadow = true; group.add(head);
            // Legs
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), mat);
                leg.position.set((i%2===0?-0.8:0.8), 1, (i<2?1.5:-1.5));
                leg.castShadow = true; group.add(leg);
            }
            // Tail
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 3), mat);
            tail.position.set(0, 2.5, -3); tail.rotation.x = Math.PI/4; group.add(tail);
            
            group.position.set(0,0,0);
            return group;
        }

        function createElephant() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.9 });
            const tuskMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 5), mat);
            body.position.y = 3; body.castShadow = true; group.add(body);
            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), mat);
            head.position.set(0, 3.5, 3.5); head.castShadow = true; group.add(head);
            // Ears
            const earL = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 0.2), mat);
            earL.position.set(-2, 3.5, 3); earL.rotation.y = -Math.PI/6; group.add(earL);
            const earR = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 0.2), mat);
            earR.position.set(2, 3.5, 3); earR.rotation.y = Math.PI/6; group.add(earR);
            // Trunk
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.2, 3), mat);
            trunk.position.set(0, 2, 4.5); trunk.rotation.x = -Math.PI/8; group.add(trunk);
            // Tusks
            const tuskL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.01, 1.5), tuskMat);
            tuskL.position.set(-0.8, 2.5, 4.5); tuskL.rotation.x = -Math.PI/4; group.add(tuskL);
            const tuskR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.01, 1.5), tuskMat);
            tuskR.position.set(0.8, 2.5, 4.5); tuskR.rotation.x = -Math.PI/4; group.add(tuskR);
            // Legs
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 2), mat);
                leg.position.set((i%2===0?-1.5:1.5), 1, (i<2?1.5:-1.5));
                leg.castShadow = true; group.add(leg);
            }
            
            return group;
        }

        function createGiraffe() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xffcc44, roughness: 0.8 });
            const spotMat = new THREE.MeshStandardMaterial({ color: 0x553311 });
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 3), mat);
            body.position.y = 4; body.rotation.x = -0.1; body.castShadow = true; group.add(body);
            // Neck
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 5), mat);
            neck.position.set(0, 6.5, 1.5); neck.rotation.x = 0.2; neck.castShadow = true; group.add(neck);
            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 1.5), mat);
            head.position.set(0, 9, 2); head.castShadow = true; group.add(head);
            // Horns
            const hornL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), spotMat);
            hornL.position.set(-0.2, 9.5, 1.5); group.add(hornL);
            const hornR = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), spotMat);
            hornR.position.set(0.2, 9.5, 1.5); group.add(hornR);
            // Legs
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 4), mat);
                leg.position.set((i%2===0?-0.8:0.8), 2, (i<2?1:-1));
                leg.castShadow = true; group.add(leg);
            }
            
            return group;
        }

        function createRhino() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.9 });
            const hornMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 4.5), mat);
            body.position.y = 2; body.castShadow = true; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 2), mat);
            head.position.set(0, 2, 2.5); head.castShadow = true; group.add(head);
            const horn1 = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1, 8), hornMat);
            horn1.position.set(0, 2.8, 3.2); horn1.rotation.x = -0.2; group.add(horn1);
            const horn2 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.6, 8), hornMat);
            horn2.position.set(0, 2.5, 2.6); horn2.rotation.x = -0.2; group.add(horn2);
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 1.5), mat);
                leg.position.set((i%2===0?-1:1), 0.75, (i<2?1.5:-1.5));
                leg.castShadow = true; group.add(leg);
            }
            return group;
        }

        function createZebra() {
            const group = new THREE.Group();
            // Procedural striped texture approach via striped boxes
            const matW = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
            const matB = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            
            for(let j=0; j<8; j++) {
                const slice = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 0.4), j%2===0?matW:matB);
                slice.position.set(0, 2.5, -1.4 + (j*0.4));
                slice.castShadow = true; group.add(slice);
            }
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 1.5), matW);
            head.position.set(0, 3.5, 2); head.castShadow = true; group.add(head);
            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 1), matB);
            snout.position.set(0, 3.2, 2.8); group.add(snout);
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 2.5), matW);
                leg.position.set((i%2===0?-0.5:0.5), 1.25, (i<2?1.2:-1.2));
                leg.castShadow = true; group.add(leg);
            }
            return group;
        }

        function createHippo() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x4a4a5a, roughness: 0.5 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.5, 5), mat);
            body.position.y = 1.5; body.castShadow = true; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 3), mat);
            head.position.set(0, 1.5, 3.5); head.castShadow = true; group.add(head);
            const snout = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 2), mat);
            snout.position.set(0, 1.2, 4.5); snout.castShadow = true; group.add(snout);
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 1), mat);
                leg.position.set((i%2===0?-1.2:1.2), 0.5, (i<2?1.5:-1.5));
                leg.castShadow = true; group.add(leg);
            }
            return group;
        }

        models['cheetah'] = createCheetah();
        models['elephant'] = createElephant();
        models['giraffe'] = createGiraffe();
        models['rhino'] = createRhino();
        models['zebra'] = createZebra();
        models['hippo'] = createHippo();

        // Add all to scene, hide them
        for(let key in models) {
            scene.add(models[key]);
            models[key].visible = false;
        }

        let currentModel = null;
        let targetRotation = 0;
        let currentRotation = 0;

        function showModel(id) {
            if(currentModel) {
                currentModel.visible = false;
            }
            currentModel = models[id];
            currentModel.visible = true;
            currentModel.rotation.y = -Math.PI/2; // Start facing left slightly
            targetRotation = 0;
            currentRotation = -Math.PI/2;
            
            // Update UI
            const data = Database[id];
            document.documentElement.style.setProperty('--accent', data.accent);
            document.getElementById('infoTitle').innerText = data.title;
            document.getElementById('infoSub').innerText = data.sub;
            document.getElementById('infoDesc').innerText = data.desc;
            
            data.stats.forEach((s, i) => {
                document.getElementById(`stat${i+1}-val`).innerText = s.v;
                document.getElementById(`stat${i+1}-bar`).style.width = '0%';
                setTimeout(() => {
                    document.getElementById(`stat${i+1}-bar`).style.width = s.p + '%';
                }, 100);
            });

            const panel = document.getElementById('infoBox');
            panel.classList.remove('visible');
            setTimeout(() => panel.classList.add('visible'), 50);
            
            try { AudioEngine.playSwoosh(); } catch(e){}
        }

        // --- Interaction ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                AudioEngine.init();
                try { AudioEngine.playClick(); } catch(e){}
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                showModel(e.target.dataset.id);
            });
        });

        // Mouse rotation
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        document.addEventListener('mousedown', () => { isDragging = true; });
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('mousemove', (e) => {
            if (isDragging && currentModel) {
                const deltaMove = { x: e.offsetX - previousMousePosition.x };
                targetRotation += deltaMove.x * 0.01;
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            if(currentModel) {
                // Smooth rotation interpolation
                currentRotation += (targetRotation - currentRotation) * 0.1;
                currentModel.rotation.y = currentRotation;
                
                // Idle breathing animation
                currentModel.position.y = Math.sin(time * 2) * 0.1;
            }
            
            // Slowly rotate lights for dynamic shadows
            spotLight.position.x = Math.sin(time * 0.5) * 20;
            spotLight.position.z = Math.cos(time * 0.5) * 20;

            renderer.render(scene, camera);
        }

        // Remove loading screen and start
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        
        document.querySelector('[data-id="cheetah"]').click(); // Load first model
        animate();

    </script>
</body>
</html>
