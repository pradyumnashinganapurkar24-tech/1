<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gravity Worm — Snake in 3D Space</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050012;overflow:hidden;font-family:'Orbitron',monospace}
#hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;z-index:10;text-align:center;display:none}
#sc{font-size:40px;color:#00ffaa;text-shadow:0 0 20px #00ffaa}
#info{font-size:13px;color:#666;margin-top:4px}
.ov{position:fixed;inset:0;background:rgba(0,0,10,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff}
h1{font-size:56px;color:#00ffaa;text-shadow:0 0 40px #00ffaa;margin-bottom:12px}
p{font-size:15px;color:#aaa;margin:5px 0}
.btn{margin-top:28px;padding:14px 44px;background:transparent;border:2px solid #00ffaa;color:#00ffaa;font-size:18px;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:3px;transition:.3s;border-radius:4px}
.btn:hover{background:#00ffaa;color:#000;box-shadow:0 0 30px #00ffaa}
</style>
</head>
<body>
<div id="hud"><div>LENGTH <span id="sc">3</span></div><div id="info">Arrow Keys to steer | Speed: <span id="spd">1</span></div></div>
<div class="ov" id="start">
  <h1>GRAVITY WORM</h1>
  <p>3D Snake — but you steer through a rotating cube.</p>
  <p>Collect red orbs to grow. Avoid walls and yourself.</p>
  <p style="color:#00ffaa;margin-top:10px">Arrow Keys to turn</p>
  <button class="btn" onclick="startGame()">SLITHER</button>
</div>
<div class="ov" id="dead" style="display:none">
  <h1 style="color:#ff4466;text-shadow:0 0 40px #ff4466">DEAD</h1>
  <p style="font-size:22px;margin:14px">LENGTH: <span id="fl" style="color:#00ffaa">3</span></p>
  <button class="btn" style="border-color:#ff4466;color:#ff4466" onmouseover="this.style.background='#ff4466';this.style.color='#000'" onmouseout="this.style.background='transparent';this.style.color='#ff4466'" onclick="startGame()">RETRY</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
const G=12,CS=1.1;
let scene,cam,ren,world,snakeM=[],foodM,running=false;
let snake,dir,nextDir=null,food,score,mTimer=0,mDelay=0.2;
let audioCtx,bgN=[];

function startAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  [[110,0.05,'sine'],[165,0.03,'square'],[220,0.02,'sine']].forEach(([f,g,t])=>{
    const o=audioCtx.createOscillator(),gn=audioCtx.createGain();
    const lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();
    o.type=t;o.frequency.value=f;lfo.frequency.value=0.25;lg.gain.value=4;
    lfo.connect(lg);lg.connect(o.frequency);gn.gain.value=g;
    o.connect(gn);gn.connect(audioCtx.destination);o.start();lfo.start();
    bgN.push(o,lfo);
  });
}
function stopAudio(){bgN.forEach(n=>{try{n.stop()}catch(e){}});bgN=[];if(audioCtx){audioCtx.close();audioCtx=null;}}

function wp(v){return{x:(v.x-G/2+0.5)*CS,y:(v.y-G/2+0.5)*CS,z:(v.z-G/2+0.5)*CS};}
function inB(v){return v.x>=0&&v.x<G&&v.y>=0&&v.y<G&&v.z>=0&&v.z<G;}

function initScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x050012);
  cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,200);
  cam.position.set(0,0,26);
  ren=new THREE.WebGLRenderer({antialias:true});
  ren.setPixelRatio(devicePixelRatio);ren.setSize(innerWidth,innerHeight);
  document.body.appendChild(ren.domElement);
  scene.add(new THREE.AmbientLight(0x112233,3));
  const dl=new THREE.DirectionalLight(0x00ffaa,2);dl.position.set(10,20,10);scene.add(dl);
  world=new THREE.Group();scene.add(world);
  const box=new THREE.EdgesGeometry(new THREE.BoxGeometry(G*CS,G*CS,G*CS));
  world.add(new THREE.LineSegments(box,new THREE.LineBasicMaterial({color:0x00ffaa,transparent:true,opacity:0.2})));
}

function mkSeg(pos,isHead){
  const g=new THREE.SphereGeometry(CS*0.38,10,10);
  const m=new THREE.MeshStandardMaterial({color:isHead?0x00ffcc:0x00aa77,emissive:isHead?0x00aa44:0x003322,roughness:0.3,metalness:0.8});
  const mesh=new THREE.Mesh(g,m);const p=wp(pos);
  mesh.position.set(p.x,p.y,p.z);world.add(mesh);return mesh;
}

function mkFood(pos){
  if(foodM){world.remove(foodM);foodM.geometry.dispose();}
  const g=new THREE.OctahedronGeometry(CS*0.33);
  const m=new THREE.MeshStandardMaterial({color:0xff3366,emissive:0xff0044,emissiveIntensity:1,roughness:0,metalness:1});
  foodM=new THREE.Mesh(g,m);const p=wp(pos);
  foodM.position.set(p.x,p.y,p.z);world.add(foodM);
}

function spawnFood(){
  let p;do{p={x:Math.floor(Math.random()*G),y:Math.floor(Math.random()*G),z:Math.floor(Math.random()*G)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y&&s.z===p.z));
  food=p;mkFood(p);
}

function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('dead').style.display='none';
  document.getElementById('hud').style.display='block';
  if(ren){ren.dispose();document.querySelector('canvas')?.remove();}
  snakeM=[];running=true;mTimer=0;mDelay=0.2;nextDir=null;score=3;
  dir={x:1,y:0,z:0};
  snake=[{x:7,y:6,z:6},{x:6,y:6,z:6},{x:5,y:6,z:6}];
  initScene();
  snakeM=snake.map((s,i)=>mkSeg(s,i===0));
  spawnFood();startAudio();loop();
}

let clk=new THREE.Clock(),rotY=0;

function loop(){
  if(!running)return;requestAnimationFrame(loop);
  const dt=Math.min(clk.getDelta(),0.05);
  rotY+=dt*0.25;world.rotation.y=rotY;
  if(foodM)foodM.rotation.y+=dt*2.5;
  mTimer+=dt;
  if(mTimer>=mDelay){
    mTimer=0;
    if(nextDir&&!(nextDir.x===-dir.x&&nextDir.y===-dir.y&&nextDir.z===-dir.z))dir=nextDir;
    nextDir=null;
    const h=snake[0];
    const nh={x:h.x+dir.x,y:h.y+dir.y,z:h.z+dir.z};
    if(!inB(nh)||snake.some(s=>s.x===nh.x&&s.y===nh.y&&s.z===nh.z)){gameOver();return;}
    snake.unshift(nh);
    const hm=mkSeg(nh,true);
    if(snakeM[0]){snakeM[0].material.color.set(0x00aa77);snakeM[0].material.emissive.set(0x003322);}
    snakeM.unshift(hm);
    if(nh.x===food.x&&nh.y===food.y&&nh.z===food.z){
      score++;document.getElementById('sc').textContent=score;
      mDelay=Math.max(0.07,mDelay-0.005);
      document.getElementById('spd').textContent=Math.round((0.2-mDelay)*40+1);
      spawnFood();eatSound();
    } else {
      snake.pop();const tm=snakeM.pop();if(tm){world.remove(tm);tm.geometry.dispose();}
    }
  }
  ren.render(scene,cam);
}

function eatSound(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.value=330+score*8;o.type='triangle';
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.25);
}

function gameOver(){
  running=false;stopAudio();
  document.getElementById('hud').style.display='none';
  document.getElementById('fl').textContent=score;
  document.getElementById('dead').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')nextDir={x:0,y:0,z:dir.x?-1:0,_:dir.x?0:dir.z*-1}||{x:-1,y:0,z:0};
  if(e.key==='ArrowRight')nextDir=dir.x!==0?{x:0,y:0,z:1}:dir.z!==0?{x:1,y:0,z:0}:{x:1,y:0,z:0};
  if(e.key==='ArrowLeft')nextDir=dir.x!==0?{x:0,y:0,z:-1}:dir.z!==0?{x:-1,y:0,z:0}:{x:-1,y:0,z:0};
  if(e.key==='ArrowUp')nextDir=dir.y!==0?{x:1,y:0,z:0}:{x:dir.x,y:1,z:dir.z};
  if(e.key==='ArrowDown')nextDir=dir.y!==0?{x:1,y:0,z:0}:{x:dir.x,y:-1,z:dir.z};
  if(e.key==='ArrowLeft'){if(dir.x!==0)nextDir={x:0,y:0,z:-1};else if(dir.z!==0)nextDir={x:-1,y:0,z:0};else nextDir={x:-1,y:0,z:0};}
  if(e.key==='ArrowRight'){if(dir.x!==0)nextDir={x:0,y:0,z:1};else if(dir.z!==0)nextDir={x:1,y:0,z:0};else nextDir={x:1,y:0,z:0};}
  if(e.key==='ArrowUp'){if(dir.y!==0)nextDir={x:1,y:0,z:0};else nextDir={x:0,y:1,z:0};}
  if(e.key==='ArrowDown'){if(dir.y!==0)nextDir={x:1,y:0,z:0};else nextDir={x:0,y:-1,z:0};}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
window.addEventListener('resize',()=>{if(cam&&ren){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);}});
</script>
</body>
</html>
