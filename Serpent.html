<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERPENT NEON — 3D Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Exo+2:wght@200;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#050510;overflow:hidden;font-family:'Rajdhani',sans-serif;}
  canvas{display:block;}
  #ui{position:fixed;top:0;left:0;width:100%;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;z-index:10;pointer-events:none;background:linear-gradient(to bottom,rgba(5,5,16,0.8),transparent);}
  .stat{text-align:center;}
  .stat-label{font-size:10px;letter-spacing:4px;color:rgba(0,230,255,0.4);font-family:'Exo 2',sans-serif;}
  .stat-value{font-size:28px;font-weight:700;color:#00e6ff;text-shadow:0 0 20px #00e6ff;}
  #overlay{position:fixed;inset:0;background:rgba(2,2,10,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
  #overlay h1{font-size:clamp(48px,8vw,100px);font-weight:700;background:linear-gradient(135deg,#00e6ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;margin-bottom:12px;}
  #overlay .sub{color:rgba(255,255,255,0.3);font-family:'Exo 2',sans-serif;font-size:13px;letter-spacing:3px;margin-bottom:8px;}
  #overlay .controls{color:rgba(255,255,255,0.2);font-family:'Exo 2',sans-serif;font-size:11px;letter-spacing:2px;margin-bottom:40px;}
  .btn{background:linear-gradient(135deg,rgba(0,230,255,0.1),rgba(255,0,170,0.1));border:1px solid rgba(0,230,255,0.4);color:#00e6ff;padding:14px 44px;font-family:'Rajdhani',sans-serif;font-size:16px;letter-spacing:4px;cursor:pointer;transition:all 0.3s;font-weight:600;}
  .btn:hover{border-color:#00e6ff;box-shadow:0 0 30px rgba(0,230,255,0.3),inset 0 0 30px rgba(0,230,255,0.1);}
  #audioBtn{position:fixed;bottom:20px;right:20px;background:transparent;border:1px solid rgba(0,230,255,0.2);color:rgba(0,230,255,0.5);padding:6px 14px;font-size:11px;cursor:pointer;z-index:30;letter-spacing:2px;font-family:'Exo 2',sans-serif;}
  #speedLabel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Exo 2',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(0,230,255,0.3);}
</style>
</head>
<body>
<div id="ui">
  <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value" id="scoreEl">0</div></div>
  <div class="stat"><div class="stat-label">LENGTH</div><div class="stat-value" id="lenEl">3</div></div>
  <div class="stat"><div class="stat-label">LEVEL</div><div class="stat-value" id="lvlEl">1</div></div>
</div>
<canvas id="c"></canvas>
<div id="speedLabel">ARROW KEYS / WASD TO MOVE</div>
<div id="overlay">
  <h1>SERPENT NEON</h1>
  <div class="sub">3D NEON SNAKE EXPERIENCE</div>
  <div class="controls">ARROWS / WASD — EAT ORBS — AVOID WALLS & SELF</div>
  <button class="btn" onclick="startGame()">INITIALIZE</button>
</div>
<button id="audioBtn" onclick="toggleBGM()">♫ BGM</button>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// Audio
let actx,mGain,bgmOn=false,bgmInterval;
function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();mGain=actx.createGain();mGain.gain.value=0.35;mGain.connect(actx.destination);}
function toggleBGM(){
  initAudio();
  if(!bgmOn){bgmOn=true;playBGMLoop();document.getElementById('audioBtn').textContent='♫ ON';}
  else{bgmOn=false;if(bgmInterval)clearTimeout(bgmInterval);document.getElementById('audioBtn').textContent='♫ BGM';}
}
function playBGMLoop(){
  if(!bgmOn||!actx) return;
  const scale=[60,62,64,67,69,72,74,76];
  const pattern=[0,2,4,7,4,2,0,4,2,7,4,0,2,7,4,2];
  let t=actx.currentTime;
  pattern.forEach((n,i)=>{
    const freq=440*Math.pow(2,(scale[n%scale.length]-69)/12);
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(mGain);
    o.type=i%4===0?'triangle':'sine';
    o.frequency.value=freq*(i%8===0?0.5:1);
    g.gain.setValueAtTime(0,t+i*0.18);
    g.gain.linearRampToValueAtTime(0.25,t+i*0.18+0.05);
    g.gain.linearRampToValueAtTime(0,t+i*0.18+0.17);
    o.start(t+i*0.18);o.stop(t+i*0.18+0.18);
  });
  bgmInterval=setTimeout(playBGMLoop,pattern.length*180);
}
function playEat(){if(!actx)return;[523,659,880].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(mGain);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,actx.currentTime+i*0.04);g.gain.linearRampToValueAtTime(0.3,actx.currentTime+i*0.04+0.02);g.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+i*0.04+0.12);o.start(actx.currentTime+i*0.04);o.stop(actx.currentTime+i*0.04+0.12);});}
function playDie(){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(mGain);o.frequency.value=110;o.type='sawtooth';g.gain.setValueAtTime(0.5,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+0.8);o.start();o.stop(actx.currentTime+0.8);}

// Grid
const COLS=20,ROWS=20;
let cellW,cellH,offsetX,offsetY;
function calcGrid(){
  const size=Math.min(canvas.width,canvas.height)*0.8;
  cellW=size/COLS;cellH=size/ROWS;
  offsetX=(canvas.width-size)/2;offsetY=(canvas.height-size)/2;
}
calcGrid();

let snake,dir,nextDir,food,score,level,gameRunning=false,gameInterval,frame=0;
let particles=[];

function startGame(){
  score=0;level=1;gameRunning=true;
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  placeFood();
  updateUI();
  document.getElementById('overlay').style.display='none';
  clearInterval(gameInterval);
  gameInterval=setInterval(tick,180-level*10);
  initAudio();bgmOn=true;playBGMLoop();
  requestAnimationFrame(drawLoop);
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd=map[e.key];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){ nextDir=nd;e.preventDefault();}
});

function tick(){
  if(!gameRunning) return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // Wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    playDie();endGame();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;
    if(snake.length%5===0){level=Math.min(10,level+1);clearInterval(gameInterval);gameInterval=setInterval(tick,Math.max(60,180-level*15));}
    placeFood();playEat();
    spawnEatParticles(food);
  } else snake.pop();
  updateUI();
}

function spawnEatParticles(pos){
  const x=offsetX+pos.x*cellW+cellW/2,y=offsetY+pos.y*cellH+cellH/2;
  for(let i=0;i<12;i++) particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:1,color:`hsl(${Math.random()*60+160},100%,70%)`});
}

function updateUI(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('lenEl').textContent=snake.length;
  document.getElementById('lvlEl').textContent=level;
}

function endGame(){
  gameRunning=false;clearInterval(gameInterval);bgmOn=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="background:linear-gradient(135deg,#ff4444,#ff0088);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:clamp(40px,6vw,80px);font-weight:700;letter-spacing:6px;margin-bottom:12px;">DEAD</h1><div style="color:rgba(255,255,255,0.4);font-family:'Exo 2',sans-serif;font-size:14px;letter-spacing:3px;margin-bottom:8px;">SCORE: ${score}</div><div style="color:rgba(255,255,255,0.3);font-family:'Exo 2',sans-serif;font-size:12px;letter-spacing:2px;margin-bottom:40px;">LENGTH: ${snake.length}</div><button class="btn" style="background:linear-gradient(135deg,rgba(255,68,68,0.1),rgba(255,0,136,0.1));border:1px solid rgba(255,68,68,0.4);color:#ff4444;" onclick="startGame()">RESPAWN</button>`;
  ov.style.display='flex';
}

function drawLoop(){
  frame++;
  ctx.fillStyle='rgba(5,5,16,0.25)';ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();
  if(gameRunning){drawSnake();drawFood();}
  drawParticles();
  requestAnimationFrame(drawLoop);
}

function drawGrid(){
  ctx.strokeStyle='rgba(0,230,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(offsetX+i*cellW,offsetY);ctx.lineTo(offsetX+i*cellW,offsetY+ROWS*cellH);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(offsetX,offsetY+j*cellH);ctx.lineTo(offsetX+COLS*cellW,offsetY+j*cellH);ctx.stroke();}
  // Border
  ctx.strokeStyle='rgba(0,230,255,0.2)';ctx.lineWidth=2;
  ctx.strokeRect(offsetX,offsetY,COLS*cellW,ROWS*cellH);
  // Corner accents
  const corners=[[offsetX,offsetY],[offsetX+COLS*cellW,offsetY],[offsetX,offsetY+ROWS*cellH],[offsetX+COLS*cellW,offsetY+ROWS*cellH]];
  ctx.strokeStyle='#00e6ff';ctx.lineWidth=2;
  corners.forEach(([cx,cy])=>{
    ctx.beginPath();ctx.moveTo(cx,cy+20*(cy<canvas.height/2?1:-1));ctx.lineTo(cx,cy);ctx.lineTo(cx+20*(cx<canvas.width/2?1:-1),cy);ctx.stroke();
  });
}

function drawSnake(){
  snake.forEach((seg,i)=>{
    const x=offsetX+seg.x*cellW,y=offsetY+seg.y*cellH;
    const t=i/snake.length;
    const hue=160+t*60;
    const pad=2;
    // 3D effect — top face
    const depth=4;
    // Side
    ctx.fillStyle=`hsla(${hue},100%,20%,0.8)`;
    ctx.beginPath();ctx.roundRect(x+pad+depth,y+pad+depth,cellW-pad*2,cellH-pad*2,3);ctx.fill();
    // Main
    ctx.fillStyle=`hsla(${hue},100%,${50-t*20}%,0.9)`;
    ctx.shadowBlur=i===0?25:12;ctx.shadowColor=`hsl(${hue},100%,60%)`;
    ctx.beginPath();ctx.roundRect(x+pad,y+pad,cellW-pad*2,cellH-pad*2,3);ctx.fill();
    // Highlight
    ctx.fillStyle=`hsla(${hue},100%,90%,${0.3-t*0.25})`;
    ctx.beginPath();ctx.roundRect(x+pad+2,y+pad+2,cellW-pad*2-8,4,2);ctx.fill();
    ctx.shadowBlur=0;
    // Eyes on head
    if(i===0){
      ctx.fillStyle='#000';
      const ex=x+pad+4+dir.x*4,ey=y+pad+4+dir.y*4;
      ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+cellW-pad*2-10,ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(ex+0.5,ey+0.5,1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+cellW-pad*2-10+0.5,ey+0.5,1,0,Math.PI*2);ctx.fill();
    }
  });
}

function drawFood(){
  const x=offsetX+food.x*cellW+cellW/2,y=offsetY+food.y*cellH+cellH/2;
  const r=Math.min(cellW,cellH)*0.35;
  const pulse=Math.sin(frame*0.1)*0.15+0.85;
  // Glow
  const grad=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  grad.addColorStop(0,'rgba(255,100,0,0.4)');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);ctx.fill();
  // Orb
  ctx.shadowBlur=20;ctx.shadowColor='#ff6600';
  ctx.fillStyle='#ff8800';
  ctx.beginPath();ctx.arc(x,y,r*pulse,0,Math.PI*2);ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.ellipse(x-r*0.25,y-r*0.25,r*0.3,r*0.2,Math.PI*0.3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.04;
    if(p.life<=0) return false;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    return true;
  });
}

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;calcGrid();});
</script>
</body>
</html>
