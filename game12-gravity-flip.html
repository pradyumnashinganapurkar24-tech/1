<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gravity Flip — 3D Endless Runner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Michroma&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Michroma',sans-serif;}
#canvas{display:block;}
#hud{position:fixed;top:16px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 28px;pointer-events:none;}
.hb{background:rgba(0,255,255,0.07);border:1px solid rgba(0,255,255,0.2);border-radius:6px;padding:8px 20px;color:#00ffff;font-size:11px;letter-spacing:2px;}
.hb span{display:block;font-size:20px;font-weight:700;color:#fff;}
#overlay{position:fixed;inset:0;background:rgba(0,0,10,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#overlay h1{font-size:clamp(32px,5vw,64px);color:#00ffff;text-shadow:0 0 20px #00ffff,0 0 40px #0044ff;letter-spacing:8px;margin-bottom:6px;}
#overlay p{color:#444;font-size:11px;letter-spacing:3px;margin-bottom:36px;text-align:center;line-height:1.8;}
#startBtn{padding:14px 50px;font-family:'Michroma',sans-serif;font-size:14px;letter-spacing:4px;background:transparent;border:1px solid #00ffff;color:#00ffff;border-radius:4px;cursor:pointer;transition:all 0.3s;}
#startBtn:hover{background:rgba(0,255,255,0.08);box-shadow:0 0 30px rgba(0,255,255,0.4);}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:11px;letter-spacing:2px;}
#gravity-indicator{position:fixed;right:28px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
#gravity-arrow{font-size:32px;color:#00ffff;text-shadow:0 0 10px #00ffff;transition:transform 0.2s;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="hb">SCORE<span id="scoreVal">0</span></div>
  <div class="hb" style="text-align:center;">SPEED<span id="speedVal">1.0x</span></div>
  <div class="hb" style="text-align:right;">BEST<span id="bestVal">0</span></div>
</div>
<div id="gravity-indicator"><div style="color:#00ffff;font-size:9px;letter-spacing:2px;">GRAVITY</div><div id="gravity-arrow">↓</div></div>
<div id="hint">SPACE / CLICK — FLIP GRAVITY</div>
<div id="overlay">
  <h1>GRAVITY FLIP</h1>
  <p>FLIP GRAVITY TO DODGE OBSTACLES<br>SURVIVE AS LONG AS POSSIBLE</p>
  <button id="startBtn" onclick="startGame()">RUN</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='sine'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function flipSnd(){tone(440,0.05);tone(880,0.08,'sine',0.12,0.04);}
function dieSnd(){[330,220,110,55].forEach((f,i)=>setTimeout(()=>tone(f,0.2,0.3,'sawtooth'),i*80));}
let bgmOn=false;
function startBGM(){if(bgmOn)return;bgmOn=true;const n=[0,0,196,0,164,0,196,0,0,0,220,0];let i=0;function s(){if(!bgmOn)return;if(n[i%n.length])tone(n[i%n.length],0.2,0.04,'square');i++;setTimeout(s,200);}s();}

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x000008);scene.fog=new THREE.Fog(0x000008,40,100);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,200);
camera.position.set(0,0,14);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0x002222,2));
const dl=new THREE.DirectionalLight(0x00ffff,1.5);dl.position.set(0,10,5);dl.castShadow=true;scene.add(dl);
const pl=new THREE.PointLight(0x00ffff,2,20);scene.add(pl);

// Floor and ceiling
const floorMat=new THREE.MeshPhongMaterial({color:0x002244,emissive:0x001122,shininess:40});
const ceilMat=new THREE.MeshPhongMaterial({color:0x002244,emissive:0x001122,shininess:40});
const floor=new THREE.Mesh(new THREE.BoxGeometry(200,0.4,4),floorMat);floor.position.set(0,-4,0);floor.receiveShadow=true;scene.add(floor);
const ceil=new THREE.Mesh(new THREE.BoxGeometry(200,0.4,4),ceilMat);ceil.position.set(0,4,0);scene.add(ceil);

// Grid lines on floor
for(let i=0;i<50;i++){const l=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.02,4),new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.2}));l.position.set(i*4-100,-3.8,0);scene.add(l);}

// Player
const playerMat=new THREE.MeshPhongMaterial({color:0x00ffff,emissive:0x003333,shininess:120});
const player=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),playerMat);
player.castShadow=true;scene.add(player);
const playerLight=new THREE.PointLight(0x00ffff,2,3);scene.add(playerLight);

// Trail
const trailGeo=new THREE.BufferGeometry();const trailVerts=new Float32Array(60*3);
trailGeo.setAttribute('position',new THREE.BufferAttribute(trailVerts,3));
const trailMat=new THREE.LineBasicMaterial({color:0x00ffff,transparent:true,opacity:0.5});
const trail=new THREE.Line(trailGeo,trailMat);scene.add(trail);
const trailPoints=[];

// Obstacles
const obstacles=[];
const obsMat=new THREE.MeshPhongMaterial({color:0xff2244,emissive:0x220011,shininess:80});
const obsGeo=new THREE.BoxGeometry(0.5,0.5,3.2);

function spawnObstacle(x){
  const m=new THREE.Mesh(obsGeo,obsMat.clone());
  const fromBottom=Math.random()<0.5;
  const h=1.5+Math.random()*1.5;
  m.position.set(x,fromBottom?(-4+h/2+0.2):(4-h/2-0.2),0);
  m.scale.y=h;m.castShadow=true;scene.add(m);
  obstacles.push({mesh:m,x});
}

// Particles
const particles=[];
function burst(pos){for(let i=0;i<12;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),new THREE.MeshBasicMaterial({color:0x00ffff}));m.position.copy(pos);const v=new THREE.Vector3((Math.random()-0.5)*0.3,(Math.random()-0.5)*0.3,0);particles.push({mesh:m,vel:v,life:25});scene.add(m);}}

// State
let py=0,pvy=0,gravDir=1,gameActive=false,score=0,best=0,speed=0.1,spawnTimer=0,worldX=0;
let flippedRecently=false;

function doFlip(){if(!gameActive||flippedRecently)return;gravDir*=-1;pvy=-gravDir*0.15;flipSnd();flippedRecently=true;document.getElementById('gravity-arrow').style.transform=gravDir>0?'rotate(0deg)':'rotate(180deg)';setTimeout(()=>flippedRecently=false,120);}

document.addEventListener('keydown',e=>{if(e.code==='Space'){doFlip();e.preventDefault();}});
document.addEventListener('click',doFlip);
document.addEventListener('touchstart',doFlip);

function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('overlay').style.display='none';
  py=0;pvy=0;gravDir=1;score=0;speed=0.1;worldX=0;spawnTimer=0;
  obstacles.forEach(o=>scene.remove(o.mesh));obstacles.length=0;
  trailPoints.length=0;gameActive=true;startBGM();
  document.getElementById('gravity-arrow').style.transform='rotate(0deg)';
}

function gameOver(){
  bgmOn=false;dieSnd();burst(player.position);
  if(score>best)best=score;
  document.getElementById('bestVal').textContent=best;
  gameActive=false;
  const ov=document.getElementById('overlay');ov.style.display='flex';
  ov.querySelector('h1').textContent='CRASHED';ov.querySelector('h1').style.color='#ff2244';
  ov.querySelector('p').textContent='SCORE: '+score+' | BEST: '+best;
  ov.querySelector('button').textContent='TRY AGAIN';
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(!gameActive){renderer.render(scene,camera);return;}

  // Physics
  pvy+=gravDir*0.015;
  py+=pvy;
  player.position.set(-4,py,0);
  player.rotation.x+=0.1;player.rotation.z+=0.05;

  // Boundaries
  if(py>3.5||py<-3.5){gameOver();return;}

  // World scroll
  speed=Math.min(0.25,0.1+score*0.0001);
  worldX+=speed;
  document.getElementById('speedVal').textContent=(speed/0.1).toFixed(1)+'x';

  // Trail
  trailPoints.unshift({x:-4,y:py});
  if(trailPoints.length>20)trailPoints.pop();
  const tv=trailGeo.attributes.position.array;
  trailPoints.forEach((p,i)=>{tv[i*3]=p.x-i*0.15;tv[i*3+1]=p.y;tv[i*3+2]=0;});
  trailGeo.attributes.position.needsUpdate=true;

  // Obstacles
  spawnTimer++;const spawnRate=Math.max(40,80-score*0.05);
  if(spawnTimer>=spawnRate){spawnTimer=0;spawnObstacle(10+Math.random()*3);}
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    o.mesh.position.x-=speed;
    o.x-=speed;
    if(o.x<-15){scene.remove(o.mesh);obstacles.splice(i,1);continue;}
    // Glow pulse
    o.mesh.material.emissiveIntensity=0.2+Math.sin(Date.now()*0.008)*0.1;
    // Collision
    if(Math.abs(o.mesh.position.x-(-4))<0.5&&Math.abs(o.mesh.position.y-py)<o.mesh.scale.y/2+0.3){gameOver();return;}
  }

  // Floor/ceil scroll
  floor.position.x=-worldX%4;ceil.position.x=-worldX%4;

  score++;document.getElementById('scoreVal').textContent=score;

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.mesh.position.add(p.vel);p.life--;if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}}

  playerLight.position.copy(player.position);
  pl.position.set(-4,py,5);pl.intensity=1.5+Math.sin(Date.now()*0.01)*0.3;

  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
